<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .logo {
      width: 32px;
      height: 32px;
      margin-right: 12px;
      font-size: 24px;
    }
    
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #0f1419;
      margin: 0;
    }
    
    .description {
      font-size: 14px;
      color: #536471;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    
    .settings {
      background-color: #f7f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .setting-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    
    .setting-item:last-child {
      margin-bottom: 0;
    }
    
    .setting-label {
      font-size: 14px;
      color: #0f1419;
    }
    
    .toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #1da1f2;
    }
    
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      background-color: #1da1f2;
      color: white;
      border: none;
      border-radius: 9999px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-bottom: 8px;
    }
    
    .btn:hover {
      background-color: #1a91da;
    }
    
    .btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background-color: #fff;
      color: #1da1f2;
      border: 1px solid #1da1f2;
    }
    
    .btn-secondary:hover {
      background-color: #e8f5fd;
    }
    
    .status {
      background-color: #f7f9fa;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
    }
    
    .status-title {
      font-weight: 600;
      margin-bottom: 8px;
      color: #0f1419;
    }
    
    .status-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: #536471;
    }
    
    .status-value {
      font-weight: 500;
    }
    
    .status-ok {
      color: #17bf63;
    }
    
    .status-error {
      color: #e0245e;
    }
    
    .debug-info {
      background-color: #fff3cd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 11px;
      color: #856404;
    }
    
    .footer {
      text-align: center;
      font-size: 12px;
      color: #536471;
      margin-top: 16px;
    }
    
    .instructions {
      background-color: #e8f5fd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 12px;
      color: #1a73a7;
    }
    
    .instructions-title {
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .instructions ol {
      margin: 0;
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🌐</div>
    <h1 class="title">X.com 中文翻译</h1>
  </div>
  
  <div class="description">
    自动将推文翻译为中文，让浏览X.com更轻松。
  </div>
  
  <div class="instructions">
    <div class="instructions-title">调试步骤：</div>
    <ol>
      <li>确保在 x.com 或 twitter.com 页面</li>
      <li>打开浏览器开发者工具 (F12)</li>
      <li>查看 Console 标签页的日志</li>
      <li>点击"检查状态"查看插件状态</li>
    </ol>
  </div>
  
  <div class="settings">
    <div class="setting-item">
      <span class="setting-label">启用翻译</span>
      <label class="toggle">
        <input type="checkbox" id="enableTranslation" checked>
        <span class="slider"></span>
      </label>
    </div>
  </div>
  
  <div class="status">
    <div class="status-title">插件状态</div>
    <div class="status-item">
      <span>页面状态:</span>
      <span id="pageStatus" class="status-value">检查中...</span>
    </div>
    <div class="status-item">
      <span>找到推文:</span>
      <span id="tweetsFound" class="status-value">-</span>
    </div>
    <div class="status-item">
      <span>翻译缓存:</span>
      <span id="cacheSize" class="status-value">-</span>
    </div>
  </div>
  
  <button class="btn" id="refreshBtn">刷新翻译</button>
  <button class="btn btn-secondary" id="checkStatusBtn">检查状态</button>
  
  <div class="debug-info">
    <strong>调试提示：</strong> 打开浏览器控制台 (F12) 查看 [X-Translator] 日志
  </div>
  
  <div class="footer">
    调试版本 v1.1
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
